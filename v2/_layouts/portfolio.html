<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.browser_title %}{{ page.browser_title }}{% else %}{{ page.title }} — {{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/portfolio.css' | relative_url }}" />
</head>
<body class="{% if page.body_class %}{{ page.body_class }}{% endif %}">

  {% include portfolio/nav.html %}

  {{ content }}

  {% include portfolio/footer.html %}

  <script src="{{ '/assets/js/portfolio.js' | relative_url }}"></script>
</body>
</html>
